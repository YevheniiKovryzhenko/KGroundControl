name: Update updates.json on Release

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.3.0 or 1.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          # Explicitly checkout the default branch (main/master) so we can commit back to it
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and tag
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi
          
          # Remove 'v' prefix if present for the version number
          VERSION="${TAG_NAME#v}"
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Processing release: $TAG_NAME (Version: $VERSION)"

      - name: Check release assets
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          
          # Get release ID via API (works for both automatic and manual triggers)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG_NAME --jq '.id')
          
          # Get asset names
          ASSETS=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[].name')
          
          LINUX_24_EXISTS="false"
          LINUX_22_EXISTS="false"
          WINDOWS_EXISTS="false"
          
          LINUX_BINARY_24="KGroundControl_v${VERSION}_Ubuntu_24.04_x64"
          LINUX_BINARY_22="KGroundControl_v${VERSION}_Ubuntu_22.04_x64"
          WINDOWS_BINARY="KGroundControl_v${VERSION}_Windows_x64.exe"
          
          if echo "$ASSETS" | grep -q "^${LINUX_BINARY_24}$"; then LINUX_24_EXISTS="true"; fi
          if echo "$ASSETS" | grep -q "^${LINUX_BINARY_22}$"; then LINUX_22_EXISTS="true"; fi
          if echo "$ASSETS" | grep -q "^${WINDOWS_BINARY}$"; then WINDOWS_EXISTS="true"; fi
          
          echo "linux_24=$LINUX_24_EXISTS" >> $GITHUB_OUTPUT
          echo "linux_22=$LINUX_22_EXISTS" >> $GITHUB_OUTPUT
          echo "windows=$WINDOWS_EXISTS" >> $GITHUB_OUTPUT
          echo "linux_24_name=$LINUX_BINARY_24" >> $GITHUB_OUTPUT
          echo "linux_22_name=$LINUX_BINARY_22" >> $GITHUB_OUTPUT
          echo "windows_name=$WINDOWS_BINARY" >> $GITHUB_OUTPUT

      - name: Extract changelog safely
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          # Fetch body, default to empty string if null
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/$TAG_NAME --jq '.body // ""')
          
          # Use jq to safely escape the string for JSON (handles newlines, quotes, emojis perfectly)
          ESCAPED_BODY=$(echo "$BODY" | jq -Rs .)
          echo "body=$ESCAPED_BODY" >> $GITHUB_OUTPUT

      - name: Update updates.json
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          REPO: ${{ github.repository }}
          LINUX_24: ${{ steps.assets.outputs.linux_24 }}
          LINUX_22: ${{ steps.assets.outputs.linux_22 }}
          WINDOWS: ${{ steps.assets.outputs.windows }}
          LINUX_24_NAME: ${{ steps.assets.outputs.linux_24_name }}
          LINUX_22_NAME: ${{ steps.assets.outputs.linux_22_name }}
          WINDOWS_NAME: ${{ steps.assets.outputs.windows_name }}
          CHANGELOG: ${{ steps.changelog.outputs.body }}
        run: |
          mkdir -p docs
          FILE="docs/updates.json"
          
          # Initialize or read existing file
          if [ -f "$FILE" ]; then
            cp "$FILE" /tmp/updates.json
          else
            echo '{"updates":{}}' > /tmp/updates.json
          fi
          
          # Use the exact tag name for the URL to support both "v1.3.0" and "1.3.0"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}"
          
          if [ "$LINUX_24" == "true" ]; then
            jq --arg ver "$VERSION" \
               --arg url "${BASE_URL}/${LINUX_24_NAME}" \
               --argjson changelog "$CHANGELOG" \
               '.updates["linux-ubuntu-24.04"] = {"latest-version": $ver, "download-url": $url, "changelog": $changelog, "mandatory-update": false}' \
               /tmp/updates.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/updates.json
          fi
          
          if [ "$LINUX_22" == "true" ]; then
            jq --arg ver "$VERSION" \
               --arg url "${BASE_URL}/${LINUX_22_NAME}" \
               --argjson changelog "$CHANGELOG" \
               '.updates["linux-ubuntu-22.04"] = {"latest-version": $ver, "download-url": $url, "changelog": $changelog, "mandatory-update": false}' \
               /tmp/updates.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/updates.json
               
            # Also update generic linux fallback
            jq --arg ver "$VERSION" \
               --arg url "${BASE_URL}/${LINUX_22_NAME}" \
               --argjson changelog "$CHANGELOG" \
               '.updates["linux"] = {"latest-version": $ver, "download-url": $url, "changelog": $changelog, "mandatory-update": false}' \
               /tmp/updates.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/updates.json
          fi
          
          if [ "$WINDOWS" == "true" ]; then
            jq --arg ver "$VERSION" \
               --arg url "${BASE_URL}/${WINDOWS_NAME}" \
               --argjson changelog "$CHANGELOG" \
               '.updates["windows"] = {"latest-version": $ver, "download-url": $url, "changelog": $changelog, "mandatory-update": false}' \
               /tmp/updates.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/updates.json
          fi
          
          # Format and save
          jq '.' /tmp/updates.json > "$FILE"
          echo "✅ Generated $FILE:"
          cat "$FILE"

      - name: Commit and push changes (Conflict-Free)
        run: |
          # Check if there are any actual changes to the file
          if git diff --quiet docs/updates.json; then
            echo "ℹ️ No changes to updates.json. Skipping commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/updates.json
          git commit -m "chore: update updates.json for ${{ steps.meta.outputs.tag_name }}"
          
          # CRITICAL: Pull with rebase to avoid conflicts if multiple releases are published quickly
          # or if you committed to main while this workflow was running.
          git pull --rebase --autostash origin ${{ github.event.repository.default_branch }}
          
          git push origin HEAD:${{ github.event.repository.default_branch }}
          echo "🚀 Successfully pushed updates.json to ${{ github.event.repository.default_branch }}"